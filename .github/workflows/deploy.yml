name: Deploy Hugo site to Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build to docs
        run: hugo --minify --destination docs

      - name: Commit docs folder
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "docs: update generated site"
          file_pattern: "docs/**"
          push: true